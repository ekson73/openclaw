name: Cloud Build (GCP)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_WIF_SERVICE_ACCOUNT }}

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Submit Cloud Build
        run: |
          BUILD_ID="$(gcloud builds submit \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --config=cloudbuild.yaml \
            --substitutions=_REGION=${{ vars.GCP_REGION }},_AR_REPO=${{ vars.GCP_AR_REPO }},_IMAGE_NAME=${{ vars.GCP_IMAGE_NAME }},_IMAGE_TAG=main \
            --async \
            --format='value(id)' \
            .)"

          echo "Cloud Build ID: ${BUILD_ID}"
          echo "Cloud Build URL: https://console.cloud.google.com/cloud-build/builds/${BUILD_ID}?project=${{ vars.GCP_PROJECT_ID }}"

          while true; do
            STATUS="$(gcloud builds describe "${BUILD_ID}" --project="${{ vars.GCP_PROJECT_ID }}" --format='value(status)')"
            echo "Build status: ${STATUS}"

            if [[ "${STATUS}" == "SUCCESS" ]]; then
              break
            fi

            if [[ "${STATUS}" == "FAILURE" || "${STATUS}" == "INTERNAL_ERROR" || "${STATUS}" == "TIMEOUT" || "${STATUS}" == "CANCELLED" ]]; then
              gcloud builds describe "${BUILD_ID}" --project="${{ vars.GCP_PROJECT_ID }}"
              exit 1
            fi

            sleep 15
          done
