# Adapted from jt196/openclaw (fork-harvest adoption)
# Original: sync upstream + multi-arch Docker build
# Adapted for ekson73/openclaw
name: Sync upstream and build image

on:
  workflow_dispatch:
  schedule:
    # daily at 03:17 UTC
    - cron: "17 3 * * *"

permissions:
  contents: write

jobs:
  sync:
    name: Sync fork with upstream
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.changed.outputs.changed }}

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/openclaw/openclaw.git || true
          git fetch upstream

      - name: Merge upstream/main into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout main
          git merge --no-edit upstream/main

      - name: Detect changes
        id: changed
        run: |
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse upstream/main)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push updates to fork
        if: steps.changed.outputs.changed == 'true'
        run: |
          git push origin main

  build:
    name: Build & push Docker image
    runs-on: ubuntu-latest
    needs: sync
    if: needs.sync.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout (updated) fork
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker meta (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/openclaw
          tags: |
            type=schedule,pattern=nightly
            type=sha
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/openclaw:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/openclaw:buildcache,mode=max
